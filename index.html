<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carpenter Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="brand">
            <img src="logo.png" alt="Carpenter Logo">
            <h1>Carpenter's Craft</h1>
        </div>
    </header>

    <main>
        <section class="gallery">
            <h2>Gallery</h2>
            <div class="kitchen-gallery">
                <div class="kitchen-item">
                    <img src="kitchen1.jpg" alt="Modern Kitchen">
                    <p>Modern Kitchen</p>
                </div>
                <div class="kitchen-item">
                    <img src="kitchen2.jpg" alt="Rustic Kitchen">
                    <p>Rustic Kitchen</p>
                </div>
                <div class="kitchen-item">
                    <img src="kitchen3.jpg" alt="Traditional Kitchen">
                    <p>Traditional Kitchen</p>
                </div>
            </div>
        </section>

        <section class="contact">
            <h2>Contact Us</h2>
            <form>
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>

                <label for="message">Message</label>
                <textarea id="message" name="message" required></textarea>

                <button type="submit">Send Message</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2023 Carpenter's Craft</p>
    </footer>
</body>
</html>
