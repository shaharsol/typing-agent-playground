<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airline Flights</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Airline Name</h1>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About Us</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="flights">
            <h2>Flights on Sale</h2>
            <article class="flight">
                <h3>New York to London</h3>
                <p>Price: <strong>$499</strong></p>
                <p>Status: <span class="sale">On Sale</span></p>
            </article>
            <article class="flight">
                <h3>Los Angeles to Tokyo</h3>
                <p>Price: <strong>$699</strong></p>
                <p>Status: <span class="sale">On Sale</span></p>
            </article>
            <article class="flight">
                <h3>San Francisco to Paris</h3>
                <p>Price: <strong>$749</strong></p>
                <p>Status: <span class="normal">Regular Price</span></p>
            </article>
        </section>
    </main>

    <footer>
        <p>&copy; 2023 Airline Name - All Rights Reserved</p>
    </footer>
</body>
</html>
