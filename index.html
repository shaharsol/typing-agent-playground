<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fashion Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Fashion Shop</h1>
    </header>
    <main>
        <section class="products">
            <h2>Dresses</h2>
            <div class="product-item">
                <img src="images/dress1.jpg" alt="Elegant Dress">
                <h3>Elegant Dress</h3>
                <p>$49.99</p>
            </div>
            <div class="product-item">
                <img src="images/dress2.jpg" alt="Summer Dress">
                <h3>Summer Dress</h3>
                <p>$29.99</p>
            </div>
        </section>
        <section class="products">
            <h2>Trousers</h2>
            <div class="product-item">
                <img src="images/trousers1.jpg" alt="Classic Trousers">
                <h3>Classic Trousers</h3>
                <p>$39.99</p>
            </div>
            <div class="product-item">
                <img src="images/trousers2.jpg" alt="Casual Trousers">
                <h3>Casual Trousers</h3>
                <p>$24.99</p>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2023 Fashion Shop</p>
    </footer>
</body>
</html>
