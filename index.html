<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Art Gallery</h1>
    </header>
    <main>
        <section class="gallery">
            <h2>Paintings</h2>
            <div class="art-piece">
                <img src="painting1.jpg" alt="A beautiful landscape painting">
                <h3>Landscape</h3>
                <p>$500</p>
            </div>
            <div class="art-piece">
                <img src="painting2.jpg" alt="Abstract art">
                <h3>Abstract</h3>
                <p>$750</p>
            </div>
        </section>
        <section class="gallery">
            <h2>Sculptures</h2>
            <div class="art-piece">
                <img src="sculpture1.jpg" alt="A modern sculpture">
                <h3>Modern Art</h3>
                <p>$1500</p>
            </div>
            <div class="art-piece">
                <img src="sculpture2.jpg" alt="Classical bust">
                <h3>Classical Bust</h3>
                <p>$1200</p>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2023 Art Gallery</p>
    </footer>
</body>
</html>
